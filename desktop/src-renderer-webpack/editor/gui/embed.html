<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="google" value="notranslate">
    <title>Amethyst Player</title>
    <style>
      html,
      body,
      #app {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #11131a;
      }
      .splash-screen {
        position: absolute;
        inset: 0;
        background-color: #8169ff;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      }
      .splash-screen[hidden] {
        display: none;
      }
      .splash-spinner:after {
        content: " ";
        display: block;
        width: 64px;
        height: 64px;
        border-radius: 50%;
        border: 6px solid;
        border-color: white transparent white transparent;
        animation: splash-spinner 1.2s linear infinite;
      }
      @keyframes splash-spinner {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <noscript>
      <div class="splash-screen">
        <h1>Amethyst Player requires JavaScript</h1>
      </div>
    </noscript>

    <div class="splash-screen" hidden id="splash-need-js">
      <div class="splash-spinner"></div>
    </div>

    <script>
      (function () {
        'use strict';

        var splash = document.getElementById('splash-need-js');
        splash.hidden = false;

        window.SplashEnd = function () {
          splash.hidden = true;
        };
      }());
    </script>

    <div id="app"></div>
    <script src="embed.js"></script>
  </body>
</html>
